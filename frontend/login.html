<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Explorer</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      transition: 0.3s ease;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #5a67d8;
    }
    .toggle {
      margin-top: 15px;
      color: #667eea;
      cursor: pointer;
      text-decoration: underline;
    }
    .error {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .show-password {
      margin: -5px 0 10px;
      text-align: left;
    }
    .show-password input {
      width: auto;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="form-title">Login</h2>
    <form id="auth-form" onsubmit="return false;">
      <input type="text" id="name" name="name" placeholder="Full Name" style="display: none;" />
      <input type="email" id="email" name="email" placeholder="Email" />
      <input type="password" id="password" name="password" placeholder="Password" />
      <div class="show-password">
        <input type="checkbox" onclick="togglePassword()"> Show Password
      </div>
      <input type="tel" id="phone" placeholder="Phone Number" style="display: none;" />
      <p class="error" id="error-message"></p>
      <button type="submit">SUBMIT</button>
    </form>
    <p class="toggle" onclick="toggleForm()">Create an account</p>
  </div>

  <script>
    let isSignUp = false;

    function toggleForm() {
      isSignUp = !isSignUp;
      document.getElementById("form-title").innerText = isSignUp ? "Sign Up" : "Login";
      document.getElementById("name").style.display = isSignUp ? "block" : "none";
      document.getElementById("phone").style.display = isSignUp ? "block" : "none";
      document.querySelector(".toggle").innerText = isSignUp ? "Already have an account? Login" : "Create an account";
    }

    function togglePassword() {
      const password = document.getElementById("password");
      password.type = password.type === "password" ? "text" : "password";
    }

    function validateForm() {
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const nameEl = document.getElementById("name");
      const phoneEl = document.getElementById("phone");
      const errorMessage = document.getElementById("error-message");

      const email = emailEl.value.trim();
      const password = passwordEl.value;
      const name = nameEl.value.trim();
      const phone = phoneEl.value.trim();

      errorMessage.innerText = "";
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^[0-9]{10}$/;
      if (!emailRegex.test(email)) { errorMessage.innerText = "Invalid email format"; return false; }
      if (password.length < 6) { errorMessage.innerText = "Password must be at least 6 characters"; return false; }
      if (isSignUp) {
        if (!name) { errorMessage.innerText = "Enter a Name"; return false; }
        if (!phoneRegex.test(phone)) { errorMessage.innerText = "Invalid phone number (10 digits required)"; return false; }
      }

      alert((isSignUp ? "Account created" : "Login successful") + " (Mock validation)");
      window.location.href = 'index.html';
      return false;
    }

    document.getElementById('auth-form').addEventListener('submit', function(e){
      e.preventDefault();
      validateForm();
    });
  </script>
</body>
</html>
