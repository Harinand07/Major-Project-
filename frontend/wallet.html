<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wallet — Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="topbar">
    <div class="brand"><span class="brand-title">Explorer</span></div>
    <ul class="navlinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="blocks.html">Blocks</a></li>
      <li><a href="transactions.html">Transactions</a></li>
      <li><a href="mempool.html">MemPool</a></li>
      <li class="active"><a href="wallet.html">Wallet</a></li>
    </ul>
    <div class="search"><input id="searchInput" placeholder="Search (UI only)" /><button id="searchBtn">🔍</button></div>
    <a href="login.html" class="login-btn">Login</a>
  </nav>

  <main class="page">
    <header class="page-header"><h1>Send Bitcoin</h1><p class="lead"></p></header>

    <section class="card wallet-card">
      <label>From Address</label>
      <input id="fromAddr" placeholder="1ExampleFromAddress..." />
      <label>To Address</label>
      <input id="toAddr" placeholder="1ExampleToAddress..." />
      <label>Amount</label>
      <input id="amount" placeholder="0.01" />
      <button id="sendBtn" class="btn send-btn">Send</button>
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="mineBtn" style="background: #4CAF50; padding: 10px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold;">Mine Block</button>
        <button id="clearDataBtn" style="background: #ff4444; padding: 10px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold;">Clear All Data</button>
      </div>
    </section>
  </main>

  <script src="explorer.js"></script>
</body>
</html>
